<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reward Generator</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        background: #111;
        padding: 30px;
        border-radius: 12px;
        width: 300px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    h1 {
        margin-bottom: 20px;
    }

    input {
        width: 90%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: none;
        outline: none;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        background: #00c3ff;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #0099cc;
    }

    .loading {
        margin-top: 15px;
        display: none;
    }

    .result {
        margin-top: 15px;
        font-weight: bold;
        color: #00ffcc;
    }

    .bar {
        width: 100%;
        height: 8px;
        background: #333;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 10px;
    }

    .progress {
        height: 100%;
        width: 0%;
        background: #00ffcc;
        transition: width 0.2s;
    }
</style>
</head>
<body>

<div class="box">
    <h1>Generator</h1>
    <input type="text" id="user" placeholder="Enter Username">
    <br>
    <button onclick="generate()">Generate</button>

    <div class="loading" id="loading">
        Generating...
        <div class="bar"><div class="progress" id="progress"></div></div>
    </div>

    <div class="result" id="result"></div>
</div>

<script>
function generate() {
    let username = document.getElementById("user").value;
    let loading = document.getElementById("loading");
    let progress = document.getElementById("progress");
    let result = document.getElementById("result");

    if (!username) {
        alert("Enter a username!");
        return;
    }

    result.innerHTML = "";
    loading.style.display = "block";
    progress.style.width = "0%";

    let width = 0;
    let interval = setInterval(() => {
        if (width >= 100) {
            clearInterval(interval);
            loading.style.display = "none";

            let fakeAmount = Math.floor(Math.random() * 10000) + 100;
            result.innerHTML = "Success! Generated: " + fakeAmount;
        } else {
            width += Math.random() * 10;
            progress.style.width = width + "%";
        }
    }, 200);
}
</script>

</body>
</html>
